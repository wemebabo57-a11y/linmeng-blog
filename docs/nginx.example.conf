# ============================================================
# 林梦博客 Nginx 配置示例
# 部署：宝塔面板 → 网站 → 配置文件 → 粘贴到 server 块
# 注意：fastcgi_pass 路径按宝塔实际 PHP 版本调整
#       查看：宝塔 → PHP 管理 → 查看 unix socket 路径
# ============================================================

# 强制 HTTPS 跳转
server {
    listen 80;
    server_name kslinmeng.cn www.kslinmeng.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kslinmeng.cn www.kslinmeng.cn;

    # SSL 证书路径（在宝塔面板中自动配置）
    # ssl_certificate     /www/server/ssl/kslinmeng.cn/fullchain.pem;
    # ssl_certificate_key /www/server/ssl/kslinmeng.cn/privkey.pem;

    root /www/wwwroot/kslinmeng.cn;
    index index.php index.html;

    # ---- 隐藏敏感文件 ----
    location ~ /\.(env|git|user\.ini|htaccess|trae) {
        deny all;
        return 404;
    }
    location ~ ^/(composer\.(json|lock)|package\.json|\.env) {
        deny all;
        return 404;
    }
    # 核心代码目录禁止直接访问
    location ~ ^/includes/ {
        deny all;
        return 404;
    }
    # 文档目录禁止访问
    location ~ ^/docs/ {
        deny all;
        return 404;
    }
    # .trae 工作目录
    location ~ ^/\.trae/ {
        deny all;
        return 404;
    }

    # ---- 上传目录禁止执行脚本 ----
    location ~* /assets/uploads/.*\.(php|phtml|pl|py|sh|cgi|asp|aspx)$ {
        deny all;
        return 403;
    }

    # 防目录列举
    autoindex off;

    # ---- 安全头（兜底；CSP 由 PHP 动态设置以保留 nonce 空间） ----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # 禁用不必要的 HTTP 方法
    if ($request_method !~ ^(GET|POST|HEAD|OPTIONS)$) {
        return 405;
    }

    # ---- 静态资源缓存 ----
    location ~* \.(css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- 错误页 ----
    error_page 403 /403.php;
    error_page 404 /404.php;
    error_page 500 502 503 504 /50x.html;

    # ---- PHP 处理 ----
    location ~ \.php$ {
        # 宝塔默认 socket 路径，按 PHP 版本调整，例如：
        #   PHP 7.4: /tmp/php-cgi-74.sock
        #   PHP 8.0: /tmp/php-cgi-80.sock
        #   PHP 8.1: /tmp/php-cgi-81.sock
        fastcgi_pass unix:/tmp/php-cgi-80.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # 主路由
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
